[govctl]
id = "WI-2026-05-28-003"
title = "Remove direct libc dependency for cross-platform support"
status = "done"
created = "2026-05-28"
started = "2026-05-28"
completed = "2026-05-29"
refs = ["ADR-0014"]

[content]
description = """
Replace all direct usage of the `libc` crate from the codebase to enable cross-platform support.

Two sites require changes:
1. `src/transport/event_loop.rs` — the self-pipe mechanism (`pipe`, `read`, `write`, `fcntl`) used to wake the mio poll loop. Replace with `mio::Waker`.
2. `src/codec/pdu/encode.rs` — `libc::getrandom` syscall used for request-ID entropy on Linux. Replace with the `getrandom` crate, which provides a cross-platform API.

After both changes, `libc` can be removed from direct dependencies.
It will remain as a transitive dependency (via `cpufeatures` in `aes`/`sha2`)."""

