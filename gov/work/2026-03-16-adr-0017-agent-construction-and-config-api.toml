#:schema ../schema/work.schema.json

[govctl]
id = "WI-2026-03-16-003"
title = "ADR-0017: Agent construction and config API"
status = "queue"
created = "2026-03-16"

[content]
description = "ADR-0017 is currently a proposed stub. Before further agent construction work, we need a decided API for how the public Agent type is built: plain TCP listen address, engine ID, USM configuration (initially noAuthNoPriv), trap destination list, and error handling for invalid configuration at construction time. This work item produces a reviewed and approved ADR-0017 covering the Agent construction API in the post-TLS (USM + plain TCP) architecture per ADR-0022."

[[content.acceptance_criteria]]
text = "ADR-0017 written and approved covering the Agent construction and configuration API (post-TLS USM + plain TCP architecture)"
status = "pending"
category = "changed"

[[content.acceptance_criteria]]
text = "ADR-0017 specifies how the plain TCP listen address, engine ID, USM user configuration, and trap destinations are passed to the Agent at construction time"
status = "pending"
category = "added"

[[content.acceptance_criteria]]
text = "ADR-0017 specifies error handling for invalid or unusable configuration at construction time"
status = "pending"
category = "added"

[[content.acceptance_criteria]]
text = "ADR-0017 accounts for future extension to USM authNoPriv and authPriv without a breaking API change, per WI-2026-04-14-002"
status = "pending"
category = "added"
