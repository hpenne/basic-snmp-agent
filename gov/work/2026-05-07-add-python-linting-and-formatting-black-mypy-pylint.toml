Enforce consistent formatting, type safety, and code quality across all Python code (~2400 lines, 6 files).
Currently there is no pyproject.toml, no formatter, no type checker, and no linter configured.

Python files in scope:
- tools/req_coverage_check.py and tools/tests/test_req_coverage_check.py
- tests/system/environment.py, tests/system/steps/mib_read_steps.py, tests/system/steps/trap_steps.py
- tests/system/docker/snmptrapd/record-trap.py

Implementation plan:
- [x] Create pyproject.toml with [tool.black], [tool.mypy], and [tool.pylint] configuration
- [x] Run black and commit the one-shot reformatting
- [x] Define a typed context Protocol for Behave steps (declares attributes set on context with their known types)
- [x] Add type annotations to all functions and get mypy passing
- [x] Get pylint passing (fix findings or add targeted disables with justification)
- [x] Add Makefile targets: black --check, mypy, pylint (integrate into pre-commit)
- [ ] Add black/mypy/pylint to CI workflow"""

