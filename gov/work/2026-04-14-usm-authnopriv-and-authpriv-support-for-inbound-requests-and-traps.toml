#:schema ../schema/work.schema.json

[govctl]
id = "WI-2026-04-14-002"
title = "USM authNoPriv and authPriv support for inbound requests and traps"
status = "queue"
created = "2026-04-14"
refs = [
    "ADR-0022",
    "WI-2026-03-16-004",
    "WI-2026-03-16-005",
]

[content]
description = """
Placeholder tracking the future extension of the agent's SNMP USM implementation from the current noAuthNoPriv security level to authNoPriv (HMAC message authentication) and authPriv (authentication plus encryption), per RFC 3414.

Scope sketch (to be fleshed out when this work item is picked up and a dedicated RFC is drafted):
- USM user database: storage for users, their security levels, authentication protocol and keys, privacy protocol and keys.
- Engine discovery and time synchronisation per RFC 3414 §4.
- Localised key derivation per RFC 3414 §2.6.
- Authentication protocols: HMAC-SHA-2 family at minimum (HMAC-MD5 and HMAC-SHA-1 are obsolete and need explicit consideration before inclusion).
- Privacy protocols: AES-128/192/256 CFB per RFC 3826 (DES is obsolete).
- Apply the same USM security levels to outbound traps so that inbound requests and outbound traps share one authentication story.
- Governance: a new RFC clause under RFC-0001 (or a new RFC) to replace the retired C-AUTH with USM-specific normative requirements; new REQ tags, since REQ-0015..REQ-0020 are burned.

This is a placeholder. Do not start implementation until the follow-up RFC has been drafted and advanced.

Supersedes the cancelled work items WI-2026-03-16-004 (TLS layer via rustls) and WI-2026-03-16-005 (upgrade MIB read system tests to TLS) per ADR-0022."""
