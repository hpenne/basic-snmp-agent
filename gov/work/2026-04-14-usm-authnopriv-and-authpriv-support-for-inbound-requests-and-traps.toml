#:schema ../schema/work.schema.json

[govctl]
id = "WI-2026-04-14-002"
title = "USM authNoPriv and authPriv support for inbound requests and traps"
status = "done"
created = "2026-04-14"
started = "2026-04-15"
completed = "2026-04-16"
refs = [
    "ADR-0022",
    "WI-2026-03-16-004",
    "WI-2026-03-16-005",
    "RFC-0007",
]

[content]
description = """
Specification and design of SNMPv3 USM authNoPriv and authPriv for inbound requests and outbound traps.

Scope:
- RFC-0007 (SNMP USM Authentication and Privacy): nine clauses covering the USM security model, single-user configuration, HMAC-SHA-256/512 authentication, AES-128/256-CFB privacy, localised key material and zeroisation, engine-ID discovery and time synchronisation, inbound message processing, and outbound trap security.
- ADR-0023 (USM user database configuration model), ADR-0024 (engine boots persistence trait), ADR-0025 (key zeroisation mechanism).
- RFC-0005 v0.3.0: retire REQ-0057 (silent discard on contextEngineID mismatch), replaced by RFC-0007 REQ-0104 (Report PDU).

Implementation is out of scope for this work item and will be tracked separately after RFC-0007 is finalised."""

