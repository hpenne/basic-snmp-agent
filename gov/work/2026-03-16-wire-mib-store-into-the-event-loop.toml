[govctl]
schema = 1
id = "WI-2026-03-16-001"
title = "Wire MIB store into the event loop"
status = "queue"
created = "2026-03-16"

[content]
description = "`EventLoop` currently has no MIB store. `SetValue` commands print to stderr instead of updating any state. This work item adds a `mib::Store` field to `EventLoop`, initialises it in `new`, and wires `drain_commands` to call `store.set(oid, value)`."

[[content.acceptance_criteria]]
text = "EventLoop struct has a store: mib::Store field"
status = "pending"
category = "added"

[[content.acceptance_criteria]]
text = "EventLoop::new initialises the store"
status = "pending"
category = "added"

[[content.acceptance_criteria]]
text = "drain_commands calls store.set(oid, value) for SetValue commands instead of printing to stderr"
status = "pending"
category = "fixed"

[[content.acceptance_criteria]]
