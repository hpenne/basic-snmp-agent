category = "fixed"

[[content.acceptance_criteria]]
text = "F-09 — Change password_to_localised_key to return Result<SecretKey, KdfError>; reject empty password with error instead of panic"
status = "done"
category = "fixed"

[[content.acceptance_criteria]]
text = "F-10 — Reject passwords shorter than 8 bytes in password_to_localised_key with KdfError per RFC 3414 §11.2"
