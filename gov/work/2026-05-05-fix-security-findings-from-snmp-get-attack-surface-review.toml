[content]
description = """
Describe the work to be done.
What is the goal? What are the acceptance criteria?"""

[[content.acceptance_criteria]]
text = "F-01 — Seed privacy salt counter with random u64: on Linux read 8 bytes from /dev/urandom; on other platforms use RandomState::new().build_hasher() fed with seconds and nanoseconds from SystemTime::now()"
status = "done"
category = "fixed"

[[content.acceptance_criteria]]
text = "F-02 — Move usmStatsUnknownEngineIDs counter increment before reportableFlag check in discovery probe path (dispatch.rs:231-236); fix test to expect counter == 1"
status = "done"
category = "fixed"

[[content.acceptance_criteria]]
text = "F-03 — Add MAX_CONNECTIONS compile-time default (64); expose override via EventLoop builder API; reject new connections at limit with log warning"
status = "done"
category = "fixed"

[[content.acceptance_criteria]]
text = "F-04 — Add idle connection timeout: default 5 min, reduced to 30 s when connections >= max - 5. Three named constants (normal timeout, pressure timeout, pressure headroom). All configurable via a config struct exposed through builder API. Add last_activity: Instant to ConnectionState; sweep stale connections in poll loop"
status = "done"
category = "fixed"

[[content.acceptance_criteria]]
text = "F-05 — Reject negative msg_id in decode_v3_envelope (snmp.rs) with BerError after decoding"
status = "done"
category = "fixed"

[[content.acceptance_criteria]]
text = "F-06 — Reject max_size < 484 in decode_v3_envelope (snmp.rs) per RFC 3412 §6.6"
status = "done"
category = "fixed"

[[content.acceptance_criteria]]
text = "F-07 — Apply value & i32::MAX to trap message ID counter after fetch_add to prevent negative msgID values on wrap"
status = "done"
category = "fixed"

[[content.acceptance_criteria]]
text = 'F-08 — Introduce UserName newtype that rejects empty strings at construction (Result-returning constructor). Replace String in UsmUser with UserName; remove debug_assert\! calls from UsmUser constructors'
