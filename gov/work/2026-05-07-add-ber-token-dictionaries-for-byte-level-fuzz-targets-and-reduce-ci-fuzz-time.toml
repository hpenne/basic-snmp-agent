#:schema ../schema/work.schema.json

[govctl]
id = "WI-2026-05-07-001"
title = "Add BER token dictionaries for byte-level fuzz targets and reduce CI fuzz time"
status = "done"
created = "2026-05-07"
started = "2026-05-07"
completed = "2026-05-07"

[content]
description = """
Add a libfuzzer dictionary file with BER/SNMP token bytes to improve mutation quality for the existing byte-level fuzz targets.
The dictionary gives libfuzzer recognisable byte sequences (BER tags, SNMP PDU type tags, the fixed engine ID, user name, OID prefixes) so that random mutations are more likely to produce structurally meaningful perturbations without requiring a custom mutator.
A single dictionary file is shared by snmpv3_request and snmpv3_request_auth.
The tcp_framing target is excluded — its input space is too small to benefit.

Also reduce the ClusterFuzzLite daily batch run from 600s to 300s to avoid exhausting CI CPU budget, especially once the structured fuzz targets from [[WI-2026-05-07-002]] are added.

Implementation plan:
- [x] Create fuzz/snmpv3.dict with BER and SNMP token entries
- [x] Update Makefile fuzz targets to pass -dict=fuzz/snmpv3.dict for snmpv3_request and snmpv3_request_auth
- [x] Update cflite_daily.yml fuzz-seconds from 600 to 300"""

[[content.acceptance_criteria]]
