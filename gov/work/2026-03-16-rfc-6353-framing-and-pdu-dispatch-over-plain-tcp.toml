[govctl]
id = "WI-2026-03-16-002"
title = "RFC 6353 framing and PDU dispatch over plain TCP"
status = "done"
created = "2026-03-16"
started = "2026-03-16"
completed = "2026-03-16"

[content]
description = "With the MIB store wired in, this work item makes the event loop respond to SNMP requests over plain TCP (no TLS). Each accepted connection gets a `ConnectionState` holding the stream and a read buffer. Incoming bytes are accumulated until a complete RFC 6353 frame (4-byte big-endian length prefix + payload) is available, then decoded, dispatched through the existing request handlers (`handle_get`, `handle_get_next`, `handle_get_bulk`, `handle_set`), and a length-prefixed response is written back. Invalid payloads are silently discarded. Prerequisite: WI-2026-03-16-001."

