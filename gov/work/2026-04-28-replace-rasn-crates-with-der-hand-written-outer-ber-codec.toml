#:schema ../schema/work.schema.json

[govctl]
id = "WI-2026-04-28-004"
title = "Replace rasn crates with hand-written BER codec"
status = "active"
created = "2026-04-28"
started = "2026-04-28"

[content]
description = """
Replace the rasn, rasn-snmp, and rasn-smi production dependencies with a fully hand-written BER codec.

**Motivation:** The rasn ecosystem pulls in ~30 transitive dependencies (nom, bitvec, chrono, num-bigint, serde_json, snafu, proc-macro infrastructure) that are never exercised by this project.
This makes auditing impractical.

**Approach:** Hand-write the complete BER codec in `src/codec/ber/` — tag/length/value primitives (`BerReader`, `BerWriter`), integer encoding (signed i32, unsigned u32/u64), OID encoding, SEQUENCE nesting, and all SNMP-specific structures (PDUs, VarBinds, SNMPv3 envelopes, USM security parameters, SNMPv2c messages).
The original plan called for delegating inner primitives to the RustCrypto `der` crate, but the hand-written primitives turned out complete and correct on their own, so `der` was never used and was removed.
The production codec now has zero external ASN.1/BER dependencies.
rasn remains as a dev-dependency for cross-implementation verification in unit tests.

**Scope:** Replace the production codec in `src/codec/pdu/encode.rs` and `src/codec/pdu/decode.rs`.
Transport-layer test code that uses rasn for fixture construction is unaffected (rasn stays as dev-dependency).
The `snmpv3-frames` test helper crate also retains rasn.

## Known caveats and interop risks

1. The hand-written codec rejects indefinite-length encodings (forbidden by SNMP per X.690).
   Managers must use definite-length encoding, which all mainstream implementations do.
2. Encoding output is DER-canonical, which is valid BER per X.690.
   No interop concern on the encoding side.
3. Cross-implementation testing (new codec vs rasn in unit tests) provides confidence in correctness but does not cover every edge case in the wild.

## ADR context (for later)

When the migration is complete, the following ADRs need updating:

**Supersede ADR-0005** ("codec: Use rasn and rasn-snmp for BER codec"):
The new ADR should record the decision to replace rasn with a fully hand-written BER codec, the motivation (audit burden from ~30 transitive deps, plus the `der` crate turning out unnecessary), the interop caveats above, and that rasn is retained as a dev-dependency for cross-implementation verification.
Alternatives considered: keep rasn (works but audit burden remains), `der` crate for inner primitives (planned but unnecessary — hand-written primitives are ~700 lines and well-tested), snmp-parser/asn1-rs (lacks encoding support).

**Supersede ADR-0007** ("codec: Use rasn-snmp wire types directly"):
The new codec defines its own BER structures rather than using rasn-snmp wire types in production.
ADR-0011 (Value enum as public API) remains valid and is strengthened — the decoupling it mandates is even more important without rasn-snmp types in production code.

## Implementation plan

- ● Implement BER primitives module (tag, length, integer, OID wire encoding)
- ● Implement SNMP structure encode/decode: SNMPv3 Message, HeaderData, USMSecurityParameters, ScopedPdu, ScopedPduData
- ● Implement PDU encode/decode: Pdus CHOICE (context-tagged), PDU, BulkPDU
- ● Implement VarBind encode/decode: VarBind, VarBindValue CHOICE, ObjectSyntax/SimpleSyntax/ApplicationSyntax
- ● Implement APPLICATION-tagged types: IpAddress, Counter32, Gauge32, TimeTicks, Opaque, Counter64
- ● Implement SNMPv2c Message encoding (for plain trap delivery)
- ● Replace production encode.rs and decode.rs to use new codec
- ● Move rasn, rasn-snmp, rasn-smi to dev-dependencies only
- ● Remove unused `der` crate dependency
- ● Verify all existing tests pass with new codec
- ○ Add Behave tests for SNMPv3 noAuthNoPriv traps (similar to SNMPv2c trap scenarios)
- ○ Write or update ADRs to record the final decision
- ○ Run clippy pedantic and govctl check"""

