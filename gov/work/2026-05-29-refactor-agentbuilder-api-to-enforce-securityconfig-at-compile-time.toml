[govctl]
id = "WI-2026-05-29-002"
title = "Refactor AgentBuilder API to enforce SecurityConfig at compile time"
status = "done"
created = "2026-05-29"
started = "2026-05-29"
completed = "2026-06-01"
refs = [
    "RFC-0007",
    "ADR-0023",
    "ADR-0024",
    "ADR-0028",
]

[content]
description = """
Refactor the AgentBuilder public API so that required security parameters are enforced at compile time rather than silently defaulting to insecure values.

## Motivation

The current API allows constructing an authenticated agent (authNoPriv or authPriv) without providing an EngineBootsStore.
This silently defaults to boots=1, which breaks timeliness validation (RFC 3414 §3.2) and risks AES IV reuse (RFC 3826 §3.1) across restarts.

Additionally, the current UsmUser type bakes the security level into the user, but per RFC 3414 §5 the security level is a per-message property — the user table only stores credentials (capabilities).
The current exact-match security-level enforcement (REQ-0079) also prevents accepting messages at a higher security level than the configured minimum, which is unnecessarily restrictive.

## Design

- **RFC-0007 amendment:** Replace exact security-level match (REQ-0079) with minimum-floor semantics.
Refactor C-USM-MODEL and C-USM-USERS to separate user credentials (capabilities) from agent security policy (minimum floor).
- **External API types:** `AuthNoPrivUser` (name + auth protocol + auth key) and `AuthPrivUser` (name + auth protocol + auth key + priv protocol) provide compile-time proof of credential availability.
- **SecurityConfig enum:** `NoAuthNoPriv`, `AuthNoPriv { user, boots_store }`, `AuthPriv { user, boots_store }` — bundles the required parameters so illegal states are unrepresentable.
- **AgentBuilder::new(SecurityConfig):** The mandatory parameter moves to the constructor; optional parameters (listen address, max connections, timeout config, engine ID) stay as builder methods with defaults.
- **Internal UsmUser:** Capabilities-based (name + optional auth + optional priv).
`From<AuthNoPrivUser>` and `From<AuthPrivUser>` convert at construction time.
- **Message acceptance:** The SecurityConfig variant sets a minimum floor.
Messages at or above the floor are accepted if the user's credentials can satisfy the requested level.

## Implementation plan

- [x] Amend RFC-0007 clauses for floor-based acceptance and capabilities-based user model
- [x] Create AuthNoPrivUser and AuthPrivUser public types
- [x] Create SecurityConfig enum
- [x] Implement From conversions
- [x] Refactor AgentBuilder to take SecurityConfig in new()
- [x] Convert internal UsmUser to capabilities-based model
- [x] Update dispatch logic for floor-based acceptance
- [x] Update all tests and test-agent binaries
- [x] Update README examples"""

