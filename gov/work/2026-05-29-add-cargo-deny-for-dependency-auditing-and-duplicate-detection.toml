[content]
description = """
Add `cargo-deny` to the project to enforce supply-chain hygiene.
Two checks are required: advisory scanning against the RUSTSEC database, and banning duplicate versions of the same crate in the dependency tree.
The check must run locally as part of `make pre-commit` and daily in CI via a scheduled GitHub Actions workflow.

## Implementation plan

- [x] Create `deny.toml` with advisories and bans configuration
- [x] Add `cargo-deny` target to Makefile and wire into `pre-commit`
- [x] Create daily CI workflow (`.github/workflows/deny.yml`)
- [x] Verify `cargo deny check` passes on current dependency tree"""

