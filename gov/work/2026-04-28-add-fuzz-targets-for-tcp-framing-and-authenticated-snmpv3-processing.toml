[govctl]
id = "WI-2026-04-28-003"
title = "Add fuzz targets for TCP framing and authenticated SNMPv3 processing"
status = "done"
created = "2026-04-28"
started = "2026-04-28"
completed = "2026-04-29"

[content]
description = """
Add two new fuzz targets to close coverage gaps identified in the fuzz audit.
The existing snmpv3_request fuzzer covers the inbound pipeline well but misses the TCP framing layer (first code to touch untrusted network input) and authenticated/encrypted processing paths (usm_user is None in the current fuzzer).
Both targets must be wired into the Makefile and CI pipeline alongside the existing fuzzer."""

[[content.acceptance_criteria]]
