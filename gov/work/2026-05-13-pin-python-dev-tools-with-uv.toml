#:schema ../schema/work.schema.json

[govctl]
id = "WI-2026-05-13-001"
title = "Pin Python dev tools with uv"
status = "done"
created = "2026-05-13"
started = "2026-05-19"
completed = "2026-05-19"

[content]
description = """
Replace bare `pip install` with uv for all Python tooling in CI and local development.
Currently CI installs black, mypy, pylint, and pytest without version pins, meaning any new release can break the build — the same class of problem we solved for Rust with rust-toolchain.toml.

uv manages a lockfile (uv.lock) that pins exact versions, and `uv run <tool>` auto-syncs the virtual environment, so local and CI builds stay in lockstep with no manual install step.

## Implementation plan

- [x] Add `[dependency-groups]` dev group to pyproject.toml with minimum version constraints
- [x] Add behave and its dependencies to pyproject.toml (replacing tests/system/requirements.txt)
- [x] Run `uv lock` to generate uv.lock
- [x] Update CI python-lint job: install uv, run `uv sync`, replace pip install
- [x] Update CI system-tests job: install uv, run `uv sync`, replace pip install
- [x] Update CI trace job: install uv, run `uv sync`
- [x] Update Makefile targets to use `uv run`
- [x] Remove tests/system/requirements.txt"""

