[content]
description = """
Implement RFC-0007 (SNMP USM Authentication and Privacy) covering all 33 requirements across the eight normative clauses.

Key implementation areas:
- SecretKey newtype with write_volatile zeroisation (ADR-0025)
- USM user configuration types with compile-time safety (C-USM-USERS, C-USM-AUTH, C-USM-PRIV)
- Localised key derivation helper and priv-key-from-auth derivation (C-USM-KEYS)
- EngineBootsStore trait and built-in file-backed implementation (C-USM-DISCOVERY, ADR-0024)
- Engine-ID discovery and time-synchronisation response handling (C-USM-DISCOVERY)
- Inbound USM message processing: HMAC verification, AES decryption, processing order, Report PDUs (C-USM-INBOUND)
- contextEngineID mismatch Report PDU replacing retired REQ-0057 (C-USM-INBOUND REQ-0104)
- Outbound trap authentication and encryption (C-USM-TRAPS)
- Integration with existing Agent construction API

Implementation plan:
- [x] Step 1: SecretKey newtype with Drop zeroisation via write_volatile + compiler_fence (REQ-0085, ADR-0025)
- [x] Step 2: AuthProtocol types and HMAC-SHA-256/512 compute/verify; key-length validation (REQ-0086, REQ-0087, REQ-0083)
- [x] Step 3: PrivProtocol types and AES-128/256-CFB128 encrypt/decrypt; priv-key-from-auth derivation (REQ-0088, REQ-0089, REQ-0084)
- [x] Step 4: Type-safe USM user configuration types enforcing security-level and key-length invariants at compile time (REQ-0090, REQ-0091, REQ-0092, REQ-0075, REQ-0076, REQ-0077)
- [x] Step 5: Localised key derivation helper per RFC 3414 §2.6 / RFC 7860 (REQ-0081, REQ-0082)
- [x] Step 6: EngineBootsStore trait and file-backed implementation with atomic writes (REQ-0094, REQ-0095, REQ-0096, REQ-0097)
- [x] Step 7: Wire USM user and boots store into AgentBuilder (keeping existing path intact) (REQ-0074, REQ-0076, REQ-0081)
- [x] Step 8: Engine-ID discovery and time synchronisation handling (REQ-0093, REQ-0098, REQ-0099)
- [x] Step 9: Behave test for engine-ID discovery (REQ-0093)
- [x] Step 10a: Split codec/pdu.rs into types, decode, and encode sub-modules. The file is 2000 lines and the upcoming USM codec changes (steps 10d, 10g) would push it well past that. Split along three natural concerns: types.rs (Varbind, ErrorStatus, InboundPdu, GetResponse, UsmSecurityFields, V3InboundMessage, DecodeError, EncodeError — pure data definitions), decode.rs (decode_pdu, decode_v3_message, rasn-to-domain conversions), encode.rs (encode_response, encode_v3_response, encode_v3_report, encode_trap, domain-to-rasn conversions). Tests split with their corresponding module. Purely mechanical refactor, no logic changes.
- [x] Step 10b: Add USM counter OIDs (usmStatsUnknownUserNames, usmStatsUnsupportedSecLevels, usmStatsWrongDigests, usmStatsDecryptionErrors) to counters.rs. Extend DispatchContext with usm_user: Option<&UsmUser> and the four new counters. Update all call sites (event loop, fuzz target, dispatch tests, doc example) to pass None / zero counters. No logic changes — purely structural.
- [x] Step 10c: User-name lookup with Report PDU (REQ-0078, REQ-0080). After the discovery probe check (satisfying REQ-0080 — discovery before user-name enforcement), if a USM user is configured, compare v3_msg.user_name against usm_user.name(). On mismatch: increment counter, respond with usmStatsUnknownUserNames Report PDU. Tests: matching name proceeds; non-matching name gets Report; None user (backward-compat) proceeds as before.
- [x] Step 10d: Security-level enforcement with Report PDU (REQ-0079, REQ-0103). Add SecurityLevel::from_msg_flags(flags: u8) helper. After user-name check, compare message security level against configured user's level. On mismatch: increment counter, respond with usmStatsUnsupportedSecLevels Report PDU. REQ-0103 is satisfied naturally: noAuthNoPriv messages that pass this check skip auth/decrypt. Tests: exact match proceeds; level mismatch gets Report; helper maps flag bits correctly.
- [x] Step 10e: Codec changes for HMAC verification. Preserve msgAuthenticationParameters (received MAC) in UsmSecurityFields. Preserve raw message bytes in V3InboundMessage (needed for HMAC-over-whole-message with zeroed auth field). Tests: round-trip preserves auth parameters; raw bytes match input.
- [x] Step 10f: HMAC verification in dispatch (REQ-0100, REQ-0102). For authenticated messages, recompute HMAC over raw message bytes (auth field zeroed) and compare against received MAC. On failure: increment counter, respond with usmStatsWrongDigests Report PDU. Processing order (REQ-0102) enforced by placement: user-name → level → HMAC → time → decrypt. Tests: correct HMAC proceeds; wrong HMAC gets Report.
- [ ] Step 10g: Time-window validation in dispatch (REQ-0098 integration). After HMAC passes, call is_in_time_window. On failure: increment usmStatsNotInTimeWindows counter, respond with Report PDU. Tests: in-window proceeds; out-of-window gets Report.
- [ ] Step 10h: Codec changes for encrypted PDU handling. Preserve msgPrivacyParameters (privacy salt/IV material) in UsmSecurityFields. Accept ScopedPduData::EncryptedPdu in decode_v3_message — return raw ciphertext instead of rejecting. Add variant or field on V3InboundMessage to carry either decoded PDU or encrypted blob. Tests: encrypted PDU accepted and ciphertext preserved; cleartext path unchanged.
- [ ] Step 10i: Decryption in dispatch (REQ-0101). For authPriv messages, after HMAC and time-window pass, decrypt ciphertext using PrivProtocol::decrypt with derived priv key and IV from privacy parameters. Decode decrypted cleartext as ScopedPdu and extract inner PDU. On failure: increment counter, respond with usmStatsDecryptionErrors Report PDU. Tests: correct key decrypts; wrong key gets Report; corrupted ciphertext gets Report.
- [ ] Step 11: Behave tests for authenticated GET requests (authNoPriv and authPriv) (REQ-0078, REQ-0079, REQ-0080)
- [ ] Step 12: contextEngineID mismatch Report PDU replacing silent discard (REQ-0104)
- [ ] Step 13: Behave test for contextEngineID mismatch (REQ-0104)
- [ ] Step 14: Outbound trap authentication and encryption (REQ-0105, REQ-0106)
- [ ] Step 15: Behave tests for authenticated traps (REQ-0105, REQ-0106)"""

