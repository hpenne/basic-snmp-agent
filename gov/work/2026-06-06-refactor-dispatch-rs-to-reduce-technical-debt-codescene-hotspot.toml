[content]
description = """
Behaviour-preserving internal restructuring of src/transport/dispatch.rs to clear CodeScene-identified technical debt. The file is the project's top refactoring hotspot: code health 6.24 (Yellow) at baseline, the lowest in the codebase, with rising friction (0.349/month and climbing). It is the security-critical SNMPv3 message-processing pipeline, so debt here carries correctness risk as well as maintenance cost. The end goal is the aggregate code health of the codebase as a whole, not the score of any single file in isolation.

Baseline CodeScene smells in production code: Low Cohesion (LCOM4=3); Code Duplication across the check_security_model / check_discovery_probe / check_engine_id functions; Large Method (decrypt_scoped_pdu, 70 LoC); Excess Number of Function Arguments (dispatch_pdu_and_encode_response = 7, decrypt_scoped_pdu = 7, verify_hmac = 5; threshold is 4); and Primitive Obsession (35% of functions take raw primitives). Note (2026-06-12): the whole-file Primitive Obsession figure is now 57% because test functions dominate after the production cleanup; step 5's parameter-struct/builder constraint addresses this implicitly and it is checked explicitly at the step-6 measurement.

This is a pure restructuring covered by the existing dispatch pipeline decision (ADR-0020) — no new requirements, no RFC, no ADR. The work proceeds in small, independently shippable steps, each driven through /implement-and-review (red/green TDD, clippy/test/traceability gates) and verified afterwards with the CodeScene code_health_score tool before moving to the next.

Measurement finding (2026-06-11, after steps 1-3): scoring the production half (lines 1-514) and the test module (lines 516-2566) of dispatch.rs separately shows the production code at 10.0 with zero findings, while the test module alone scores 5.76 and carries every remaining smell — including the Low Cohesion (LCOM4=3) previously attributed to production code. The originally planned module split along security/decode/crypto responsibilities was therefore dropped: it targeted code CodeScene already scores as optimal, would not move the score (the cohesion components live in the test module), and would fragment the single sequential pipeline mandated by ADR-0020.

Steps:
1. DONE - Collapse the duplicated check_security_model / check_discovery_probe / check_engine_id functions into a shared, parameterised check.
2. DONE - Introduce parameter-object newtypes bundling the shared security/scoped-PDU context, reducing dispatch_pdu_and_encode_response, verify_hmac, and decrypt_scoped_pdu below the 4-argument threshold and removing primitive-obsession smells.
3. DONE - Extract IV/salt derivation and the decrypt step from decrypt_scoped_pdu into named helpers to bring it under 70 LoC. (Satisfied as side effect of step 2.)
4. MERGED INTO STEP 5 (2026-06-12) - The build_authpriv_frame and authpriv round-trip refactor would be reshaped again when the module-wide helper vocabulary lands, so it is now a set of constraints on step 5's outcome rather than a separate pass: the authPriv frame builder is designed as part of the shared helper vocabulary from the start.
5. DONE (2026-06-12) - Helper-heavy test refactor (scope widened 2026-06-11 at user direction; absorbed step 4 on 2026-06-12): extracted shared helpers across the whole test module — frame-construction helpers (including an AuthPrivFrameParams builder replacing build_authpriv_frame's 76 LoC / 7 args, with splice_hmac_into_authpriv_frame / splice_hmac_into_frame shared splice helpers), a run_dispatch scaffolding helper collapsing the mib/ctx/process_snmpv3_request boilerplate, and common assertion helpers (assert_counter_saturates, assert_discarded_and_counter_incremented, decrypt_and_verify_authpriv_response behind AuthPrivResponseParams). All constraints held: per-test Verifies annotations preserved, given/when/then intent visible through helper naming, helpers under 70 LoC / 4 args, 54 tests unchanged in name and assertion, full gate suite green (pre-commit incl. fuzz and traceability, plus 51 behave scenarios). Delivered through three /implement-and-review iterations.
6. Decision point: re-measure dispatch.rs with CodeScene after step 5. Test-module relocation to dispatch/tests.rs was considered and rejected (2026-06-12): the goal is aggregate codebase health, and relocation removes no smells — it only redistributes them to another file while breaking the project-wide convention of inline #[cfg(test)] modules. Measurement after step 5 (2026-06-12): score 7.32 (up from 6.48); Large Method and Excess Arguments smells fully cleared; remaining findings are test-side Code Duplication (10 clone groups of short tests sharing helper sequences, as predicted), Low Cohesion (LCOM4=3), and Primitive Obsession (52%, down from 57%). The file is below the 8.0 gate, so the decision is live: decide with the user between (a) merging the surviving clone families more aggressively — e.g. one well-named test per family member sharing a single scenario-runner helper, balanced against the no-opaque-parameterisation constraint and per-test Verifies annotations — and (b) accepting the measured ceiling and adjusting the gate to it, documenting the remaining duplication as deliberate test readability.

Scope revision (2026-06-11): the earlier decision to drop full test dedup (19 functions, 10 clone groups) is reversed at the user's direction. The user prefers a helper-heavy test style with ~6-line test bodies as their readable baseline, which removes the readability objection behind the f3af9cf revert; traceability is preserved by the per-test Verifies constraint above. Expected effect: dissolves most duplication clone groups, clears the test-code Large Method smells, and may merge the LCOM4=3 components via shared helpers acting as connective tissue. Known risks: clone detection may still match short tests invoking the same helper sequence in the same order (the five counter_does_not_overflow tests and the four without_reportable_flag tests are the likely survivors), and pushing parameters into helpers can relocate the Excess Arguments smell — both are measured at step 6, not assumed away. Outcome (2026-06-12): the clone-survival risk materialised as predicted; the Excess Arguments relocation risk did not (no helper trips the threshold).

Hard gate: dispatch.rs code_health_score >= 8.0 (up from 6.24 baseline; 6.48 after steps 1-3; 7.32 after step 5), subject to re-evaluation at the step-6 decision point. The business-case top-5% target (9.1) is a stretch goal, not a blocking criterion."""
notes = ["Test-module relocation to dispatch/tests.rs is rejected (2026-06-12): the goal is aggregate codebase health — relocation removes no smells, only redistributes them, and breaks the project-wide inline #[cfg(test)] convention. Do not propose it again."]

