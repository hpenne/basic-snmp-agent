status = "active"
created = "2026-06-06"
started = "2026-06-06"
refs = ["ADR-0020"]

[content]
description = """
Behaviour-preserving internal restructuring of src/transport/dispatch.rs to clear CodeScene-identified technical debt. The file is the project's top refactoring hotspot: code health 6.24 (Yellow), the lowest in the codebase, with rising friction (0.349/month and climbing). It is the security-critical SNMPv3 message-processing pipeline, so debt here carries correctness risk as well as maintenance cost.

CodeScene smells in production code: Low Cohesion (LCOM4=3); Code Duplication across the check_security_model / check_discovery_probe / check_engine_id functions; Large Method (decrypt_scoped_pdu, 70 LoC); Excess Number of Function Arguments (dispatch_pdu_and_encode_response = 7, decrypt_scoped_pdu = 7, verify_hmac = 5; threshold is 4); and Primitive Obsession (35% of functions take raw primitives).

This is a pure restructuring covered by the existing dispatch pipeline decision (ADR-0020) — no new requirements, no RFC, no ADR. The work proceeds in small, independently shippable steps, each driven through /implement-and-review (red/green TDD, clippy/test/traceability gates) and verified afterwards with the CodeScene code_health_score tool before moving to the next.

Steps:
1. ✅ Collapse the duplicated check_security_model / check_discovery_probe / check_engine_id functions into a shared, parameterised check.
2. ✅ Introduce parameter-object newtypes bundling the shared security/scoped-PDU context, reducing dispatch_pdu_and_encode_response, verify_hmac, and decrypt_scoped_pdu below the 4-argument threshold and removing primitive-obsession smells.
3. ✅ Extract IV/salt derivation and the decrypt step from decrypt_scoped_pdu into named helpers to bring it under 70 LoC. (Satisfied as side effect of step 2.)
4. Refactor build_authpriv_frame (76 LoC, 7 args) and the authpriv decrypt test (94 LoC) to reduce Large Method and Excess Arguments smells in test code.
5. Split the module along its natural responsibilities (security checks vs. PDU decode/dispatch vs. crypto) to raise cohesion, e.g. a dispatch/security.rs submodule alongside the existing report submodule. This targets the Low Cohesion (LCOM4=3) smell, likely the heaviest contributor to the score.

Test code duplication (19 functions, 10 groups) was evaluated and dropped as a step: the structural similarity is inherent to testing parallel rejection paths through the same pipeline, and reducing it would require sacrificing test readability or requirement traceability — neither acceptable trade-offs for a CodeScene score.

Hard gate: dispatch.rs code_health_score >= 8.0 (up from 6.24 baseline, currently 6.48 after steps 1-3). The business-case top-5% target (9.1) is a stretch goal, not a blocking criterion."""

