#:schema ../../../schema/clause.schema.json

[govctl]
id = "C-ENGINE"
title = "Engine ID and Context"
kind = "normative"
status = "active"
since = "0.2.0"

[content]
text = """
[REQ-0055] The agent MUST accept a configurable `snmpEngineID` at construction time.

[REQ-0056] The agent MUST support only the default context (empty `contextName`).

[REQ-0058] The agent MUST silently discard any scoped PDU whose `contextName` is not the empty string.
[REQ-0059] The agent SHOULD additionally respond with a Report PDU incrementing `snmpUnknownContexts` as specified in RFC 3412.

REQ-0057 (silent discard on `contextEngineID` mismatch) is retired; the tag is burned and MUST NOT be reused. The replacement behaviour — responding with a Report PDU carrying `snmpUnknownEngineIDs` — is specified in RFC-0007:C-USM-INBOUND REQ-0104.

**Rationale:**
SNMPv3 requires an authoritative engine ID to identify the agent. Supporting only the default context keeps the scope simple while remaining compliant for single-context deployments. Silent discard is the safe minimum-viable response to a mismatched `contextName`; the SHOULD for a Report PDU allows a conformant implementation later without mandating it now."""
