#:schema ../../../schema/clause.schema.json

[govctl]
id = "C-INBOUND"
title = "Inbound Request Handling"
kind = "normative"
status = "active"
since = "0.2.0"

[content]
text = """
[REQ-0021] The agent MUST handle GetRequest, GetNextRequest, and GetBulkRequest PDUs by resolving each requested OID against the internal MIB store and returning the values in a Response PDU.

[REQ-0022] The agent MUST copy the request-id from the incoming PDU into the corresponding Response PDU unchanged.

[REQ-0023] The agent MUST return a `noSuchObject` exception varbind for any OID in a GetRequest that is not present in the MIB store.

[REQ-0024] The agent MUST return an `endOfMibView` exception varbind for a GetNextRequest or GetBulkRequest OID for which no lexicographically next OID exists in the MIB store.
[REQ-0025] If the MIB store is empty, every OID in a GetNextRequest or GetBulkRequest MUST result in an `endOfMibView` exception varbind.

[REQ-0026] The agent MUST apply the `non-repeaters` and `max-repetitions` fields of a GetBulkRequest as specified in RFC 3416 Â§4.2.3.
[REQ-0027] If `max-repetitions` is zero, the agent MUST return only the non-repeater varbinds.

[REQ-0028] If the BER-decoded `max-repetitions` value is negative (outside the protocol range of 0..2147483647), the agent MUST treat it as zero.

[REQ-0029] The agent MUST accept a configurable maximum `max-repetitions` cap.
[REQ-0030] If an incoming GetBulkRequest specifies a `max-repetitions` value exceeding this cap, the agent MUST clamp it to the configured maximum.
[REQ-0031] The default cap MUST be 100.

[REQ-0032] The agent MUST respond to any SetRequest with a Response PDU containing error-status `notWritable` (value 17) and the error-index set to the index of the first varbind.

[REQ-0117] The agent MUST reject any inbound message whose BER-indicated length exceeds the engine's maximum message size before allocating memory for the payload.

[REQ-0118] The agent MUST reject any inbound SNMPv3 message whose `msgID` field, after BER integer decoding, is negative (outside the range 0..2147483647 defined in RFC 3412 Â§6.2).

[REQ-0119] The agent MUST reject any inbound SNMPv3 message whose `msgMaxSize` field is less than 484, as specified in RFC 3412 Â§6.6.

[REQ-0133] The agent MUST bound the encoded size of a GetBulkRequest Response PDU so that the complete SNMPv3 message does not exceed `min(msgMaxSize, MAX_FRAME_SIZE)`, where `msgMaxSize` is the value from the inbound message's `HeaderData` and `MAX_FRAME_SIZE` is the agent's local frame-size limit (65535).
The agent MUST enforce this bound during varbind accumulation so that oversized responses are never fully constructed in memory.

[REQ-0134] When the response size limit would be exceeded, the agent MUST truncate the repeating section of the GetBulkRequest response at a complete row boundary (all columns for one repetition), as specified in RFC 3416 Â§4.2.3.
The non-repeating section MUST NOT be truncated.

**Rationale:**
These behaviours follow RFC 3416.
Returning `notWritable` for SET requests informs the manager that the agent explicitly does not support writes, which is preferable to silent discard as it allows managers to report a clear error.
Clamping `max-repetitions` prevents resource exhaustion from requests with excessively large repetition counts.
REQ-0033, which previously required silently discarding PDUs received over a TLS connection with an unverified peer certificate, has been retired together with RFC-0006; the tag is burned and MUST NOT be reused.

Rejecting oversized messages at the framing layer (REQ-0117) prevents an attacker from forcing large allocations by sending a message with a crafted BER length field. The check must occur before the payload is read into a buffer.

Validating `msgID` (REQ-0118) and `msgMaxSize` (REQ-0119) catches malformed messages early. A negative `msgID` has no defined meaning in RFC 3412 and could cause unexpected behaviour if used as an index or map key. A `msgMaxSize` below 484 violates the protocol minimum and indicates a malformed or crafted message.

Bounding GETBULK response size (REQ-0133, REQ-0134) prevents amplification attacks where an attacker sends a small GETBULK request with high max-repetitions against a MIB containing large OctetString values, producing a multi-megabyte response that exceeds the negotiated message size.
The size bound is enforced during construction rather than post-hoc truncation to prevent memory exhaustion from building oversized responses (RFC 3416 Â§4.2.3)."""
