#:schema ../../../schema/clause.schema.json

[govctl]
id = "C-FACADE"
title = "Log facade dependency"
kind = "normative"
status = "active"
since = "0.1.0"

[content]
text = """
The crate MUST depend on the `log` crate as its logging facade.
The crate MUST NOT depend on any specific logging backend.
Selecting and configuring a backend is the responsibility of the consuming application."""
