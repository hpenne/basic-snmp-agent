#:schema ../../../schema/clause.schema.json

[govctl]
id = "C-AUTH"
title = "Certificate Authentication"
kind = "normative"
status = "active"

[content]
text = """
[REQ-0015] The agent MUST authenticate inbound peers using X.509 certificates via the TLS layer.
Certificate-chain verification (peer cert chains to a trusted CA) is the authentication gate.
Mapping the peer certificate to a named security principal (tmSecurityName per RFC 5953 §5.3.2) is out of scope for this implementation: the agent grants access to any TLS-authenticated peer without further identity discrimination.

[REQ-0016] USM and community-string authentication MUST NOT be supported.

[REQ-0017] The agent MUST accept its own certificate and private key at construction time.

[REQ-0018] The agent MUST accept a set of trusted CA certificates at construction time, used to verify connecting peers.

[REQ-0019] The agent MUST reject any TLS handshake from a peer whose certificate does not chain to a trusted CA.

[REQ-0020] Outbound traps are sent over plain UDP and MUST NOT require any authentication or encryption.

[REQ-0074] Inbound SNMPv3 messages MUST be accepted when the message-level security model is TSM (securityModel = 4).
The msgSecurityParameters field for TSM messages is treated as opaque; no USM-specific parsing is applied.

Certificate changes require restarting the agent.

**Rationale:**
Certificate-based authentication eliminates the shared-secret weaknesses of USM and community strings.
The TLS handshake (REQ-0019) is the authoritative authentication gate; a separate tmSecurityName mapping step is unnecessary when all authenticated peers share the same access level (full MIB read-only).
Requiring a restart for certificate changes keeps the implementation simple; the agent is expected to be lightweight and fast to restart.
Traps are sent over plain UDP and therefore have no TLS context to authenticate."""
