#:schema ../../../schema/clause.schema.json

[govctl]
id = "C-MIB-STORE"
title = "Internal MIB Store"
kind = "normative"
status = "superseded"
superseded_by = "RFC-0003:C-MIB-STORE"
since = "0.1.0"

[content]
text = """
[REQ-0060] The library MUST maintain an internal MIB store that holds all OID-to-value mappings.
[REQ-0061] The store MUST preserve lexicographic ordering of OIDs to support efficient GETNEXT and GETBULK traversal.

[REQ-0062] The library MUST expose a public method on `Agent` to set a single OID's value.
[REQ-0063] The method MUST use upsert semantics: if the OID already exists in the store, its value is updated; if it does not exist, a new entry is created.

[REQ-0064] The set method MUST be safe to call from any thread.
[REQ-0065] The method MUST NOT require `&mut self`.

[REQ-0066] Inbound SNMP requests MUST be resolved against the internal MIB store.

[REQ-0067] The library MUST NOT expose any public API for removing OID entries from the store.

**Rationale:**
A push model where the application updates a library-owned MIB store is simpler to integrate than a pull model with a callback trait. The application controls when values change, and the library always has a consistent snapshot to serve. Thread-safe access via `&self` allows the application to update MIB values from any context (e.g. a synchronous monitoring loop). Lexicographic ordering is required by GETNEXT and GETBULK to walk the MIB tree efficiently."""
