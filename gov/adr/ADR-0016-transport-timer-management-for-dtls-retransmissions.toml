[govctl]
schema = 1
id = "ADR-0016"
title = "transport: Timer management for DTLS retransmissions"
status = "proposed"
date = "2026-03-04"
refs = [
    "RFC-0001",
    "ADR-0002",
    "ADR-0004",
]

[content]
context = "dimpl's sans-IO model emits Output::Timeout(Instant) events requiring the caller to schedule timers and call handle_timeout() when they fire. With multiple concurrent DTLS sessions, the event loop needs a strategy for tracking and firing per-session timers efficiently."
decision = "TBD"
consequences = "TBD"
