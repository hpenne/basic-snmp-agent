#:schema ../schema/adr.schema.json

[govctl]
id = "ADR-0008"
title = "codec: Trap UDP send buffer sizing"
status = "accepted"
date = "2026-03-04"
refs = [
    "RFC-0001",
    "ADR-0002",
]

[content]
context = """
The agent sends outbound trap PDUs over plain UDP.
The send buffer must be large enough to hold any realistic trap PDU.
Trap PDUs are typically small (a handful of varbinds), but the RFC does not constrain message size."""
decision = """
Size the UDP send buffer for outbound traps to 1500 bytes (standard Ethernet MTU).
Trap PDUs that exceed this size will fail to send and the error will be reported per-destination as specified in C-TRAPS."""
consequences = """
A 1500-byte buffer accommodates any realistic trap PDU within a single Ethernet frame.
Traps exceeding the MTU would be fragmented or dropped by the network anyway, so capping at 1500 bytes avoids sending traps that are unlikely to arrive intact.
Memory overhead is trivial."""

[[content.alternatives]]
text = "9000 bytes (jumbo frame): unnecessarily large for trap PDUs which are typically small"
status = "considered"

[[content.alternatives]]
text = "65535 bytes (max UDP): wastes stack space for a scenario that never occurs on real networks"
status = "considered"
