[govctl]
schema = 1
id = "ADR-0001"
title = "arch: Workspace decomposition into internal crates"
status = "accepted"
date = "2026-03-04"
refs = ["RFC-0001"]

[content]
context = """
The RFC specifies a library crate with several distinct concerns: TLS transport, ASN.1/BER codec, MIB storage, and SNMP protocol logic.
Putting everything in a single crate would couple unrelated concerns and make the codebase harder to navigate and test.
The project needs a clear decomposition.
"""
decision = """
Decompose the project into a Cargo workspace with four internal crates:

- basic-snmp-agent: Top-level library crate. Exposes the public Agent type, ties together the other crates, owns the event loop thread.
- transport: TCP listener, TLS session management (rustls), UDP socket for outbound traps, certificate handling, event loop implementation.
- codec: ASN.1/BER encoding and decoding, SNMPv3 message framing, PDU type definitions.
- mib: MIB store (OID-to-value map, lexicographic ordering, upsert API).

Dependencies flow inward: basic-snmp-agent depends on transport, codec, and mib. transport depends on codec and mib. codec and mib are independent of each other."""
consequences = """
Each crate can be compiled and tested independently.
The dependency graph is acyclic and shallow.
The codec and mib crates have no knowledge of transport or networking, making them easy to unit test.
The trade-off is slightly more boilerplate (multiple Cargo.toml files, workspace configuration) but this is minimal for four crates.
"""

[[content.alternatives]]
text = "Single crate with modules: simpler setup but couples all concerns; harder to enforce dependency boundaries"
status = "considered"

[[content.alternatives]]
text = "Finer-grained crates (separate pdu crate from codec): PDU types and BER encoding are tightly coupled; splitting them creates circular dependency pressure"
status = "considered"
