[govctl]
schema = 1
id = "ADR-0005"
title = "codec: Use rasn and rasn-snmp for BER codec"
status = "proposed"
date = "2026-03-04"
refs = [
    "RFC-0001",
    "ADR-0001",
]

[content]
context = """
The codec crate needs an ASN.1/BER library to encode and decode SNMPv3 messages.
The library must support BER (not just DER), implicit tagging, and SEQUENCE OF — all required by SNMP.
Ideally it should have existing SNMP type definitions to avoid hand-rolling message structures.
"""
decision = """
Use rasn as the ASN.1/BER codec and rasn-snmp for SNMPv3 message type definitions.
rasn provides compile-time ASN.1 validation via derive macros, full BER encode/decode, implicit tagging, and no unsafe code.
rasn-snmp provides ready-made SNMPv3, SMI, and MIB types covering RFC 3412 and RFC 3416.
"""
consequences = """
We get correct SNMPv3 message parsing and serialization with minimal effort.
rasn is a significant dependency but it is well-maintained (~8M downloads) and proven in SNMP use (snmp-sim-rust).
The derive macro approach means the compiler catches ASN.1 structural errors at build time.
The trade-off is that rasn's API style may not match hand-tuned code, but the reduction in hand-rolled BER logic far outweighs this.
"""

[[content.alternatives]]
text = "snmp-parser (asn1-rs/nom): zero-copy parsing, used in Suricata, but analysis-focused — lacks encoding support needed for building responses"
status = "considered"

[[content.alternatives]]
text = "yasna: stable but no implicit tagging support, no SNMP types, limited maintenance"
status = "considered"

[[content.alternatives]]
text = "Hand-rolled BER: maximum control but high effort and error-prone for a well-specified protocol"
status = "considered"
