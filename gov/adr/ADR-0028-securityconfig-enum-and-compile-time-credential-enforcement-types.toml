#:schema ../schema/adr.schema.json

[govctl]
id = "ADR-0028"
title = "SecurityConfig enum and compile-time credential enforcement types"
status = "accepted"
date = "2026-05-29"
refs = [
    "RFC-0007",
    "ADR-0023",
    "ADR-0024",
]

[content]
context = """
The agent's public API uses `AgentBuilder` with optional builder methods for all configuration, including USM user and engine-boots store.
This allows constructing an authenticated agent without providing an `EngineBootsStore`, silently defaulting to `boots = 1` — breaking timeliness validation (RFC 3414 §3.2) and risking AES IV reuse (RFC 3826 §3.1.2) across restarts.

The previous `UsmUser` type baked the security level into the user via a `UserCredentials` enum with `NoAuthNoPriv`, `AuthNoPriv`, and `AuthPriv` variants.
Per RFC 3414 §5, the security level is a per-message property (`msgFlags`), not a per-user attribute — each user entry stores only credentials (protocols and keys).
The previous design conflated user capabilities with agent security policy.

[[RFC-0007]] v0.2.0 replaces exact security-level matching with minimum-floor semantics and separates user credentials from agent security policy.
The implementation must enforce the new requirements at compile time per [[RFC-0007:C-USM-USERS]] REQ-0090, REQ-0092, and REQ-0129."""
decision = """
Introduce a `SecurityConfig` enum as the mandatory first parameter to `AgentBuilder::new()`.
The enum has three variants that mirror the USM security levels, each bundling exactly the parameters required for that level:

- `SecurityConfig::NoAuthNoPriv` — no user, no boots store.
- `SecurityConfig::AuthNoPriv { user: AuthNoPrivUser, boots_store: Box<dyn EngineBootsStore> }` — user with authentication credentials, plus a boots store.
- `SecurityConfig::AuthPriv { user: AuthPrivUser, boots_store: Box<dyn EngineBootsStore> }` — user with authentication and privacy credentials, plus a boots store.

Two external API types enforce credential completeness at compile time:

- `AuthNoPrivUser` — holds a `UserName`, `AuthProtocol`, and `SecretKey` (localised authentication key).
- `AuthPrivUser` — holds a `UserName`, `AuthProtocol`, `SecretKey`, and `PrivProtocol`. The privacy key is derived from the authentication key per [[RFC-0007:C-USM-KEYS]] REQ-0084.

Both types implement `From<AuthNoPrivUser> for UsmUser` and `From<AuthPrivUser> for UsmUser`, converting to the internal capabilities-based `UsmUser` at agent construction time.

The internal `UsmUser` becomes capabilities-based: it holds a name, optional authentication credentials (protocol + key), and optional privacy credentials (protocol + key).
The invariant that privacy requires authentication is maintained by the internal `UserCredentials` enum, which has no `PrivOnly` variant.
The `security_level()` accessor is replaced by `max_security_level()`, returning the highest level the user's credentials can satisfy.

Optional parameters (listen address, engine ID, max connections, timeout config) remain as builder methods on `AgentBuilder` with sensible defaults.

Since `SecurityConfig` is required by `AgentBuilder::new()`, there is no typestate — the builder is always in a valid state from construction."""
consequences = """
The class of silent-misconfiguration bugs described in the context — missing boots store, credential mismatch — becomes unrepresentable.
Constructing an authenticated agent without an `EngineBootsStore` is a compile error.
Constructing an `AuthPriv` agent with a user that lacks privacy credentials is a compile error.
The `From` conversions are infallible, so no runtime validation or error handling is needed for these invariants.

This is a breaking API change: all call sites that use `AgentBuilder::new()` and `UsmUser` constructors must be updated.
The `UsmUser::no_auth_no_priv()`, `UsmUser::auth_no_priv()`, and `UsmUser::auth_priv()` constructors are removed from the public API.
Test-agent binaries and README examples must be updated.
The migration burden is manageable: this is a single-crate library with a small number of call sites, and the compiler errors at each site directly indicate what the new API expects.

The enum-based approach means new security levels or configuration shapes require a new variant.
This is a minor extensibility consideration — acceptable given that USM security levels are defined by the IETF RFCs and unlikely to change.

The path to multi-user support is clear: `SecurityConfig::AuthNoPriv` and `SecurityConfig::AuthPriv` can change their `user` fields from a single value to a `Vec` when [[ADR-0023]] is superseded."""

[[content.alternatives]]
text = "Typestate builder: track required fields via generic type parameters on AgentBuilder, where build() only compiles when all required fields are set."
status = "rejected"
rejection_reason = "The mandatory-constructor-parameter approach achieves the same compile-time safety with no type complexity. A single generic parameter for one required field is marginal, and the state space grows combinatorially if more required fields appear later."

[[content.alternatives]]
text = "Bundle boots store into usm_user() method: change the builder method signature to take both a user and a boots store in one call."
status = "rejected"
rejection_reason = "Couples unrelated concerns in one method signature and does not enforce credential completeness per security level."

[[content.alternatives]]
text = "Keep security level inside UsmUser and add runtime validation: the builder checks at build() time that boots store is present when the user has auth credentials."
status = "rejected"
rejection_reason = "Pushes a compile-time-enforceable invariant to runtime and contradicts RFC-0007 C-USM-USERS REQ-0090."

[[content.alternatives]]
text = "Separate builder types: AgentBuilder::no_auth() and AgentBuilder::with_usm(user, boots_store) return different builder types."
status = "rejected"
rejection_reason = "Duplicates the optional-parameter methods across both types for no additional safety beyond what the enum approach provides."
