[govctl]
schema = 1
id = "ADR-0011"
title = "codec: Value enum as public API with ObjectSyntax conversion"
status = "proposed"
date = "2026-03-04"
refs = [
    "RFC-0001",
    "ADR-0006",
    "ADR-0007",
    "ADR-0010",
]

[content]
context = """
ADR-0006 defines a flat 9-variant Value enum for the MIB store.
ADR-0007 says use rasn-snmp wire types (including ObjectSyntax) directly for serialization.
The relationship between these two types needs to be defined: where does conversion happen, and which type is exposed in the public API?
"""
decision = """
Expose the flat Value enum (ADR-0006) as the public API type for Agent::set() and trap varbinds.
Use rasn-snmp's ObjectSyntax internally for wire serialization.
The codec crate provides bidirectional conversion between Value and ObjectSyntax via From/TryFrom trait implementations.
Callers never interact with rasn-snmp types.
"""
consequences = """
The public API is ergonomic (flat enum, e.g. Value::Counter32(42)) and decoupled from rasn-snmp.
A rasn major version bump does not break callers.
The conversion is a trivial match in each direction, implemented once in the codec crate.
The negative trade-off is a per-request conversion cost when resolving SNMP requests and when the application pushes values, but this is a cheap in-memory operation — negligible compared to network I/O.
An unsupported ObjectSyntax variant received on the wire will produce a TryFrom error, which is the correct behavior for types we do not handle.
"""

[[content.alternatives]]
text = "Use ObjectSyntax directly as the MIB store and public API type: zero conversion cost, but leaks rasn-snmp into the public API, couples callers to a third-party type layout, and exposes unsupported value variants"
status = "considered"
