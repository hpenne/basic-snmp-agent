#:schema ../schema/adr.schema.json

[govctl]
id = "ADR-0002"
title = "arch: Actor model with single-threaded event loop"
status = "accepted"
date = "2026-03-04"
refs = [
    "RFC-0001",
    "ADR-0001",
]

[content]
context = """
The agent needs an execution model to handle inbound TLS connections carrying SNMP requests, send outbound traps over UDP, process SNMP requests against the MIB store, and accept commands from the application.
The agent must also accept MIB updates and trap requests from application threads."""
decision = """
Use a single-threaded event loop running on a dedicated OS thread as an actor.
The event loop owns the TCP listener, all TLS connections, and the MIB store.
It accepts incoming TCP connections, performs TLS handshakes, reads framed SNMPv3 messages from established TLS connections, and handles SNMP request dispatch.
Commands from the application (MIB updates, trap requests) arrive via channels and are drained between polls.
No async runtime is used."""
consequences = """
No locking is needed for the MIB store or TLS connections since they are owned by a single thread.
The event loop is simple to reason about and debug.
The trade-off is that all SNMP processing is sequential, but SNMP workloads are low-throughput so this is acceptable.
The application must interact with the agent exclusively through channels, which adds a small amount of latency to MIB updates but keeps the design clean."""

[[content.alternatives]]
text = "Tokio with single task: adds async runtime dependency for no benefit given the low-throughput SNMP workload"
status = "considered"

[[content.alternatives]]
text = "Tokio with per-connection tasks: better isolation but adds complexity and async runtime dependency"
status = "considered"

[[content.alternatives]]
text = "mio-based event loop: provides cross-platform polling but adds a dependency; may be reconsidered in ADR-0014"
status = "considered"
