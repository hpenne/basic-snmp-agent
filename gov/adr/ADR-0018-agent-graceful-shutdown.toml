[govctl]
schema = 1
id = "ADR-0018"
title = "agent: Graceful shutdown"
status = "proposed"
date = "2026-03-04"
refs = [
    "RFC-0001",
    "ADR-0002",
    "ADR-0003",
]

[content]
context = """
C-RUNTIME runs the event loop on a dedicated OS thread.
When the Agent is dropped or the application shuts down, the event loop thread must be stopped.
The shutdown strategy affects in-flight trap sends, pending MIB updates, and DTLS session teardown.
"""
decision = "TBD"
consequences = "TBD"
