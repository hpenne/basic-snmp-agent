[tool.black]
target-version = ["py312"]

[tool.mypy]
python_version = "3.12"
strict = true
warn_return_any = true
warn_unused_configs = true

[[tool.mypy.overrides]]
module = ["behave"]
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = ["tomli"]
ignore_missing_imports = true

# The @given/@when/@then decorators from behave are untyped; suppress the
# resulting untyped-decorator errors in all Behave step and environment files.
[[tool.mypy.overrides]]
module = ["environment", "mib_read_steps", "trap_steps"]
disable_error_code = ["untyped-decorator"]

[tool.pylint.main]
load-plugins = []

[tool.pylint."messages control"]
disable = [
    "missing-module-docstring",
    "missing-function-docstring",
    "too-many-arguments",
    "too-many-positional-arguments",
    "line-too-long",
]

[tool.pylint.format]
max-line-length = 88
