# Accept traps from any source without VACM authorisation checks.
disableAuthorization yes

# Print all OIDs in fully dotted-decimal numeric form (no MIB name translation).
# This also affects the format passed to trap handlers.
outputOption n

# Record every received trap as a JSON line via the handler script.
traphandle default /usr/local/bin/record-trap.py

# USM users for authenticated trap system tests. The -e flag identifies the
# trap sender's engine ID so that snmptrapd can localise keys and verify the
# HMAC on inbound authenticated traps.

# noAuthNoPriv trap tests (engine ID = "trap-noauth")
createUser -e 0x80001f8804747261702d6e6f61757468 noauthuser

# authNoPriv trap tests (engine ID = "trap-auth-np")
createUser -e 0x80001f8804747261702d617574682d6e70 authuser SHA-256 authpassword

# authPriv trap tests (engine ID = "trap-auth-pr")
# The privacy key is derived from the leading bytes of the localised
# authentication key (REQ-0084), so the priv password here must match
# the auth password so that snmptrapd derives the same priv key as the agent.
createUser -e 0x80001f8804747261702d617574682d7072 privtrapuser SHA-256 authpassword AES authpassword
