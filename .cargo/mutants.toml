exclude_re = [
    # Drop impl for AgentInner: the only observable effect is thread shutdown, which
    # requires intrusive test hooks (e.g. an Arc<AtomicBool> set by the thread on exit).
    # The public API offers no way to observe thread liveness after all Agent clones drop.
    "replace <impl Drop for AgentInner>::drop with \\(\\)",

    # accept_connections WouldBlock guard: distinguishes "no more pending connections"
    # (WouldBlock → break) from genuine errors (close loop). Requires injecting a
    # non-WouldBlock accept() error at the OS level to observe the difference.
    "WouldBlock.* in EventLoop::accept_connections",
    "replace == with != in EventLoop::accept_connections",

    # handle_connection_event WouldBlock guard: same reasoning as accept_connections —
    # injecting a non-WouldBlock read error requires OS-level fault injection.
    "WouldBlock.* in EventLoop::handle_connection_event",
    "replace == with != in EventLoop::handle_connection_event",

    # next_connection_token overflow guard: the comment in the source notes this fires
    # only after usize::MAX wrapping — effectively unreachable in any real test run.
    # This pattern covers only the `token_index < MAX_CONNECTIONS` check that is the
    # sole `<` comparison in EventLoop::next_connection_token today.
    "replace < with .* in EventLoop::next_connection_token",

    # parse_ber_length byte accumulation `| ^ XOR`: for this algorithm each byte
    # occupies a distinct 8-bit window (shift-left 8 before combining), so OR and XOR
    # produce identical bit patterns. The mutation is mathematically undetectable.
    "replace \\| with \\^ in parse_ber_length",

    # handle_get_bulk repeating-section guard `!repeating_varbinds.is_empty() && max_repetitions > 0`:
    # - `&& → ||`: when repeating_varbinds is empty the inner `for oid in &mut current_oids`
    #   loop iterates zero times regardless, producing identical output.
    # - `> → >=`: `for _ in 0..max_repetitions` with max_repetitions=0 iterates zero times
    #   under both `> 0` and `>= 0`, so the response is identical.
    # Both mutations are structurally undetectable through the function's output.
    "replace && with \\|\\| in handle_get_bulk",
    "replace > with >= in handle_get_bulk",

    # BerWriter::with_capacity is a performance optimisation only;
    # Default::default() produces a functionally identical empty writer.
    "replace BerWriter::with_capacity",

    # encode_signed_i32: the `value > 0 &&` guard on the sign-extension check
    # is unreachable for value=0 because the second condition
    # (raw_bytes[first_significant] & 0x80 != 0) is structurally false when
    # all bytes are 0x00. Mutating > to >= has no observable effect.
    "replace > with >= in encode_signed_i32",

    # decode_unsigned: the `integer_bytes.len() > 1` guard prevents stripping a
    # single-byte [0x00] to an empty slice. The mutation `> to >=` is semantically
    # equivalent — both paths produce value 0 for the only differing input.
    "replace > with >= in decode_unsigned",

    # engine_time_seconds: private method returning seconds since engine start.
    # Replacing with constant 0 or 1 is only distinguishable by sleeping ≥2s in a
    # test, which is fragile and slow. The implementation is trivially correct.
    "replace EventLoop::engine_time_seconds",

    # SecretKey::drop zeroises key material. The effect is not observable in safe
    # Rust — verifying it would require reading freed memory.
    "replace <impl Drop for SecretKey>::drop with \\(\\)",

    # random_u64_from_hasher: non-deterministic function (hash of SystemTime + RandomState);
    # no observable contract to assert against in unit tests.
    "replace random_u64_from_hasher",

    # random_u64: delegates to random_u64_from_hasher on getrandom failure, which is
    # non-deterministic. Both paths produce valid non-deterministic random output;
    # the difference is unobservable.
    "replace random_u64 -> u64 with",

    # next_privacy_salt initial seed: `random_u64() | 1` ensures the counter starts odd.
    # Since random_u64() is non-deterministic, the `| vs & vs ^` mutation produces a different
    # but equally valid non-deterministic seed — unobservable in tests.
    "replace \\| with .* in next_privacy_salt",

    # decode_signed_i32: the `integer_bytes.len() > 1` guard and `& 0x80` sign-bit check.
    # Mutating `> to >=` on `len > 1` is equivalent: for len=1 it tries to strip a single
    # byte against itself (the zip skips as there is no "next" byte), finding no redundant
    # prefix and leaving the byte unchanged — the decoded value is identical.
    "replace > with >= in decode_signed_i32",

    # decode_unsigned: unwrap_or fallback `integer_bytes.len() - 1` vs `integer_bytes.len() / 1`.
    # For any input slice, `len - 1` and `len / 1` both equal `len - 1` when `len >= 1`
    # (division by 1 is identity), so the `- to /` mutation produces the same index.
    "replace - with / in decode_unsigned",
]
