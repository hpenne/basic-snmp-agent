name: Fuzz

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions: read-all

jobs:
  fuzz:
    name: Prune corpus then fuzz (30 min)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build fuzz targets
        uses: google/clusterfuzzlite/actions/build_fuzzers@v1
        with:
          language: rust
          github-token: ${{ secrets.GITHUB_TOKEN }}
          sanitizer: address

      - name: Prune corpus
        uses: google/clusterfuzzlite/actions/run_fuzzers@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          fuzz-seconds: 300
          mode: 'prune'
          language: rust
          sanitizer: address

      - name: Clear artifacts before batch fuzzing
        run: rm -rf "$GITHUB_WORKSPACE/out/artifacts"

      - name: Batch fuzz
        uses: google/clusterfuzzlite/actions/run_fuzzers@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          fuzz-seconds: 1800
          mode: 'batch'
          language: rust
          sanitizer: address
