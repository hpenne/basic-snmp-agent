name: Dependency audit

on:
  schedule:
    - cron: '0 6 * * *'
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: cargo deny check
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
