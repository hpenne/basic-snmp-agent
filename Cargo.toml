[workspace]
members = [".", "tests/test-agent", "tests/test-agent-mib"]
resolver = "2"

[package]
name = "basic-snmp-agent"
version = "0.1.0"
edition = "2024"
publish = false

[features]
## Enables `encode_get_request` and `encode_v3_get_request`, which are only needed by test code.
test-support = []

[dependencies]
rasn = "0.22"
rasn-smi = "0.22"
rasn-snmp = "0.22"
mio = { version = "1", features = ["net", "os-poll", "os-ext"] }
rustls = "0.23"
libc = "0.2"
