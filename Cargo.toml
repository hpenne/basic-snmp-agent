[workspace]
members = [".", "transport", "codec", "mib", "tests/test-agent", "tests/test-agent-mib"]
resolver = "2"

[package]
name = "basic-snmp-agent"
version = "0.1.0"
edition = "2024"
publish = false

[dependencies]
codec = { path = "codec" }
mib = { path = "mib" }
transport = { path = "transport" }

[dev-dependencies]
codec = { path = "codec", features = ["test-support"] }
